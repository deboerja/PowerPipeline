version: 1
mvp_acceptance_criteria:
  note: >
    The MVP is complete only when the deployed system demonstrates these,
    not when the code merely exists or unit tests merely pass. Each item's
    status must cite validation evidence, not just "implemented." Status
    "met_in_dev" means: verified by automated tests and/or a live smoke test
    run locally, but not yet running as a scheduled service on the real
    Odin deployment — that graduation to "met" happens at wq-29 (end-to-end
    validation against the deployed system).

  sources:
    - id: src-01
      criterion: Public SPP load data ingests
      status: met_in_dev
      evidence: "tests/test_spp_load_ingest.py; live smoke test 2026-07-16 pulled real OP-MTLF-202607160000.csv, 386/386 records accepted, zero rejected"
    - id: src-02
      criterion: Public SPP load forecast and actual data ingests
      status: met_in_dev
      evidence: "same dataset/evidence as src-01 — mtlf-vs-actual carries both load and forecast-vs-actual in one schema"
    - id: src-03
      criterion: Public SPP renewable forecast and actual data ingests
      status: blocked
      note: dataset not yet located, see docs/SOURCE_REGISTRY.md and implementation/BLOCKERS.yaml bl-001
    - id: src-04
      criterion: Existing Enphase data is available in curated form
      status: not_met
    - id: src-05
      criterion: Existing weather data is available in curated form
      status: not_met

  storage:
    - id: stg-01
      criterion: Raw artifacts are retained
      status: met_in_dev
      evidence: "tests/test_spp_load_ingest.py::test_raw_landing_is_idempotent_for_identical_content, ::test_raw_landing_rejects_content_mismatch — immutability enforced"
    - id: stg-02
      criterion: Normalized data exists
      status: met_in_dev
      evidence: "tests/test_spp_load_ingest.py::test_normalization_produces_utc_columns_and_dedupes"
    - id: stg-03
      criterion: Curated data exists
      status: met_in_dev
      evidence: "tests/test_pipeline_curated.py::test_full_run_upserts_curated_and_records_run — fact_spp_load_forecast_actual populated"
    - id: stg-04
      criterion: Invalid records are quarantined
      status: met_in_dev
      evidence: "tests/test_spp_mtlf_contract.py — invalid BAA, negative forecast, non-numeric forecast all quarantined with reason"
    - id: stg-05
      criterion: Runtime data is excluded from Git
      status: met
      evidence: ".gitignore covers /srv-style runtime paths and local dev data directories"

  processing:
    - id: prc-01
      criterion: Ingestion is idempotent
      status: met_in_dev
      evidence: "tests/test_pipeline_curated.py::test_rerun_is_idempotent_no_duplicate_curated_rows — DuckDB upsert keyed on (baa, interval_start_utc)"
    - id: prc-02
      criterion: Duplicate input is handled
      status: met_in_dev
      evidence: "same as prc-01, plus raw-landing hash check"
    - id: prc-03
      criterion: Missing intervals are detected
      status: met_in_dev
      evidence: "tests/test_missing_interval_detection.py — gap flagged in data_quality_results, not interpolated"
    - id: prc-04
      criterion: Timestamps are normalized
      status: met_in_dev
      evidence: "interval_start_utc/interval_end_utc derived from GMTIntervalEnd, tz-aware; see design note in src/powerpipeline/ingest/spp_load.py"
    - id: prc-05
      criterion: Freshness is calculated
      status: met_in_dev
      evidence: "source_freshness table updated per run (src/powerpipeline/pipeline.py); read_pipeline_health operation not yet built (wq-24)"
    - id: prc-06
      criterion: Bounded backfills work
      status: not_met
      note: "watermark is recorded (source_freshness.current_watermark) but nothing yet computes a bounded re-fetch range from it — see wq-18 in WORK_QUEUE.yaml"
    - id: prc-07
      criterion: Pipeline runs are recorded
      status: met_in_dev
      evidence: "tests/test_pipeline_curated.py::test_full_run_upserts_curated_and_records_run — one pipeline_runs row per run, both success and (by construction) failure paths"

  analytics:
    - id: ana-01
      criterion: Household solar history is queryable
      status: not_met
    - id: ana-02
      criterion: Household solar forecast is queryable
      status: not_met
    - id: ana-03
      criterion: Household forecast accuracy is calculated
      status: not_met
    - id: ana-04
      criterion: SPP load forecast accuracy is calculated
      status: met_in_dev
      evidence: "tests/test_pipeline_curated.py::test_forecast_accuracy_view_returns_rows_with_published_actuals — v_spp_load_forecast_accuracy (sql/views.sql)"
    - id: ana-05
      criterion: SPP renewable forecast accuracy is calculated
      status: blocked
      note: depends on src-03

  residentai:
    - id: rai-01
      criterion: Named read-only operations work
      status: not_met
    - id: rai-02
      criterion: Arbitrary SQL is rejected
      status: not_met
    - id: rai-03
      criterion: Writes are rejected
      status: not_met
    - id: rai-04
      criterion: Range limits are enforced
      status: not_met
    - id: rai-05
      criterion: Results include provenance, freshness, and quality
      status: not_met

  operations:
    - id: ops-01
      criterion: Scheduled execution works
      status: not_met
    - id: ops-02
      criterion: Service health is visible
      status: not_met
    - id: ops-03
      criterion: Logs are available
      status: not_met
    - id: ops-04
      criterion: Restart is documented
      status: met
      evidence: docs/OPERATIONS.md
    - id: ops-05
      criterion: Rebuild is documented
      status: met
      evidence: docs/OPERATIONS.md
    - id: ops-06
      criterion: Backup and restore are documented
      status: met
      evidence: docs/OPERATIONS.md
    - id: ops-07
      criterion: Upstream failures do not destroy curated data
      status: not_met
      note: designed for (docs/FAILURE_SCENARIOS.md #5), not yet demonstrated against a running system

  demonstration:
    - id: dem-01
      criterion: Offline demonstration works
      status: not_met
    - id: dem-02
      criterion: Failure injection works
      status: not_met
    - id: dem-03
      criterion: Recovery works
      status: not_met
    - id: dem-04
      criterion: Interview instructions are complete
      status: met
      evidence: docs/INTERVIEW_DEMO.md (target shape documented; execution not yet built)

  overall_status: in_progress
  overall_note: >
    Control-plane, documentation, and a full vertical slice for SPP load
    ingestion (contract -> raw -> normalize -> quarantine -> DuckDB curated
    -> accuracy view) are built and passing 13 automated tests plus one live
    smoke test against the real SPP endpoint. Household bridges (Enphase,
    weather), ResidentAI operations, scheduling, and real /srv deployment on
    Odin are not yet built. Do not report MVP completion until every
    non-blocked item above is "met" (not "met_in_dev") with cited evidence
    from the deployed system.
